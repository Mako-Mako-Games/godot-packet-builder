name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3). Leave blank to use the pushed tag."
        required: false
  push:
    tags: [ "v*" ]

env:
  ADDON_NAME: packet-builder

jobs:
  build:
    # Runs the entire build.yml matrix as a single job in this workflow's run.
    uses: ./.github/workflows/build.yml

  package:
    name: Package & publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}
        # No submodules needed here, only the addon/ template.

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble addon folder
        shell: bash
        run: |
          set -euo pipefail
          OUT="dist/addons/${{ env.ADDON_NAME }}"
          mkdir -p "$OUT/bin"
          cp -r addon/. "$OUT/"
          for d in artifacts/bin-*; do
            base="$(basename "$d")"
            platform="$(echo "$base" | cut -d- -f2)"
            mkdir -p "$OUT/bin/${platform}"
            cp -r "$d"/* "$OUT/bin/${platform}/"
          done
          ls -R "$OUT"

      - name: Zip addon
        run: |
          cd dist
          zip -r "../${{ env.ADDON_NAME }}-${{ steps.tag.outputs.value }}.zip" addons

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          draft: true
          files: ${{ env.ADDON_NAME }}-${{ steps.tag.outputs.value }}.zip
          generate_release_notes: true
