name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}
  workflow_call: {}

env:
  ADDON_NAME: packet-builder

jobs:
  build:
    name: ${{ matrix.platform }}-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        target: [ template_debug, template_release ]
        platform: [ linux, windows, macos ]
        include:
          - platform: linux
            os: ubuntu-22.04
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
    steps:
      - name: Checkout (with godot-cpp submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: python -m pip install scons

      - name: Set up MSVC dev environment
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: >
          scons platform=${{ matrix.platform }} target=${{ matrix.target }}
          -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.platform }}-${{ matrix.target }}
          path: build/addons/${{ env.ADDON_NAME }}/bin/${{ matrix.platform }}
          if-no-files-found: error
